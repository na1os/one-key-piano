<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Key Piano</title>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  background: #1e1e2e;
  font-family: Arial, sans-serif;
}
.container {
  text-align: center;
}
.key {
  width: 120px;
  height: 300px;
  background: white;
  border: 2px solid #333;
  border-radius: 0 0 12px 12px;
  margin: 20px auto;
  cursor: pointer;
  transition: background 0.05s;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 20px;
  font-size: 1.2rem;
  color: #555;
  user-select: none;
}
.key.active {
  background: #c8e6c9;
}
.note-label {
  margin-top: 10px;
  font-size: 1.5rem;
  color: #eee;
}
.info {
  color: #aaa;
  margin-top: 20px;
}
</style>
</head>
<body>
<div class="container">
  <div class="key" id="pianoKey">Press Space</div>
  <div class="note-label" id="noteLabel">C4</div>
  <div class="info">Press the spacebar or click the key</div>
</div>
<script>
// I spent like an hour on this, trying to get the audio to work
// I had to look up how to use the Web Audio API, it's not that hard actually
// But I kept getting errors because I forgot to resume the context
// Anyway, here it is

(function() {
  // C major scale frequencies (C4 to C5)
  var scale = [
    { note: 'C4', freq: 261.63 },
    { note: 'D4', freq: 293.66 },
    { note: 'E4', freq: 329.63 },
    { note: 'F4', freq: 349.23 },
    { note: 'G4', freq: 392.00 },
    { note: 'A4', freq: 440.00 },
    { note: 'B4', freq: 493.88 },
    { note: 'C5', freq: 523.25 }
  ];
  var idx = 0;
  var keyEl = document.getElementById('pianoKey');
  var noteEl = document.getElementById('noteLabel');
  var ctx = null;

  function getCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return ctx;
  }

  function play(freq) {
    var c = getCtx();
    var osc = c.createOscillator();
    var gain = c.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, c.currentTime);
    gain.gain.setValueAtTime(0.5, c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.5);
    osc.connect(gain);
    gain.connect(c.destination);
    osc.start(c.currentTime);
    osc.stop(c.currentTime + 0.5);
  }

  function press() {
    var n = scale[idx];
    play(n.freq);
    noteEl.textContent = n.note;
    keyEl.classList.add('active');
    setTimeout(function() { keyEl.classList.remove('active'); }, 100);
    idx = (idx + 1) % scale.length;
  }

  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space') {
      e.preventDefault();
      press();
    }
  });

  keyEl.addEventListener('click', press);

  document.addEventListener('click', function() {
    if (ctx && ctx.state === 'suspended') {
      ctx.resume();
    }
  }, { once: true });
})();
</script>
</body>
</html>
